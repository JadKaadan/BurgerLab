workflows:
  ios-sidestore:
    name: iOS SideStore Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get packages
        script: |
          flutter clean
          flutter pub get

      - name: Patch Firebase iOS headers
        script: |
          set -e

          DB_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -type d -name "firebase_database-*" | head -n 1)
          AUTH_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -type d -name "firebase_auth-*" | head -n 1)
          CORE_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 -type d -name "firebase_core-*" | head -n 1)

          if [ -n "$DB_DIR" ]; then
            find "$DB_DIR/ios/Classes" -type f \( -name "*.h" -o -name "*.m" \) -exec perl -0pi -e 's|#import <Firebase/Firebase\.h>|#import <FirebaseCore/FirebaseCore.h>\n#import <FirebaseDatabase/FirebaseDatabase.h>|g' {} \;
          fi

          if [ -n "$AUTH_DIR" ]; then
            find "$AUTH_DIR/ios/Classes" -type f \( -name "*.h" -o -name "*.m" \) -exec perl -0pi -e 's|#import <Firebase/Firebase\.h>|#import <FirebaseCore/FirebaseCore.h>\n#import <FirebaseAuth/FirebaseAuth.h>|g' {} \;
          fi

          if [ -n "$CORE_DIR" ]; then
            find "$CORE_DIR/ios/Classes" -type f \( -name "*.h" -o -name "*.m" \) -exec perl -0pi -e 's|#import <Firebase/Firebase\.h>|#import <FirebaseCore/FirebaseCore.h>|g' {} \;
          fi

      - name: Build iOS without signing
        script: |
          rm -rf ios/Pods ios/Podfile.lock
          flutter build ios --release --no-codesign

      - name: Create unsigned IPA for SideStore
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r BurgerLab-unsigned.ipa Payload

    artifacts:
      - build/ios/ipa/BurgerLab-unsigned.ipa